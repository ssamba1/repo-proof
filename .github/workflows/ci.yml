name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # Ruby is not guaranteed on every runner image, so install it explicitly. This makes the
      # ruby-* fixture integration tests (verify ruby-working / fix ruby-broken) actually run in
      # CI on both Ubuntu and Windows instead of being skipped.
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install dev tooling
        run: python -m pip install --upgrade ruff pytest

      # Node and Rust are preinstalled on GitHub runners and Ruby is set up above, so the
      # Node/Rust/Ruby integration tests run here. Go and Docker tests skip cleanly when absent.
      - name: Lint
        run: python -m ruff check .

      - name: Format check
        run: python -m ruff format --check .

      - name: Test
        run: python -m pytest
